name: Release

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to release"
        required: true
        type: choice
        options:
          - agave-transaction-view
      ref:
        description: "git ref to tag (can be a branch or a commit hash)"
        required: true
        default: "master"
        type: string

permissions: {}

jobs:
  check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Compute metadata
        id: meta
        run: |
          version="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "'"${CRATE_NAME}"'") | .version')"
          if [ -z "${version}" ] || [ "${version}" = "null" ]; then
            echo "Could not resolve version for crate: ${CRATE_NAME}"
            exit 1
          fi

          tag="${CRATE_NAME}@v${version}"
          ref="$(git rev-parse HEAD)"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
        env:
          CRATE_NAME: ${{ inputs.crate }}

      - name: Check tag does not exist
        run: |
          echo "checking: refs/tags/${TAG}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: ${TAG}. Please bump the version first (or delete the existing tag) and retry."
            echo "Tag exists: ${TAG}" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
        env:
          TAG: ${{ steps.meta.outputs.tag }}

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6  # v2.82.6
        with:
          tool: toml-cli,cargo-semver-checks

      - name: Check semver
        run: ./scripts/check-semver.sh
        env:
          PACKAGE: ${{ inputs.crate }}

      - name: Cargo publish dry run
        run: |
          cargo publish -p "${CRATE_NAME}" --dry-run
        env:
          CRATE_NAME: ${{ inputs.crate }}

      - name: Summary
        run: |
          echo "Tag: ${TAG}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Ref: ${REF} (https://github.com/${REPO}/commit/${REF})" >> "${GITHUB_STEP_SUMMARY}"
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          REF: ${{ steps.meta.outputs.ref }}
          REPO: ${{ github.repository }}

  publish:
    runs-on: ubuntu-latest
    environment: prod
    needs: check
    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Create github app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set git config
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf https://github.com/
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
          ref: ${{ needs.check.outputs.ref }}

      - name: Package crate
        run: cargo package -p "${CRATE_NAME}"
        env:
          CRATE_NAME: ${{ inputs.crate }}

      - name: Generate SLSA provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        env:
          NODE_OPTIONS: --max-http-header-size=32768
        with:
          subject-path: target/package/*.crate

      - name: Create crate token
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - run: cargo publish -p "${CRATE_NAME}"
        env:
          CRATE_NAME: ${{ inputs.crate }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - run: |
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
        env:
          TAG: ${{ needs.check.outputs.tag }}

      - name: Create Release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG,
              name: `${process.env.TAG}`,
              generate_release_notes: false,
              draft: false,
              prerelease: false
            })
            return release.data.id
        env:
          TAG: ${{ needs.check.outputs.tag }}
